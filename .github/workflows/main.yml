name: Login to Majsoul

on:
  schedule:
    - cron: '5 21 * * *'  # 21:05 UTC time (6:05 a.m. Korean time)
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/main.yml'
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/main.yml'
      - 'scripts/**'
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: majsoul-login-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check current JP client metadata
        if: github.event_name == 'pull_request'
        run: npm run check:jp

      - name: Execute month ticket automation
        if: github.event_name != 'pull_request'
        run: npm start
        env:
          UID: ${{ secrets.UID }}
          TOKEN: ${{ secrets.TOKEN }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          MS_SERVER: ${{ secrets.MS_SERVER }}

      - name: Update Keep-Alive and Resource Cache
        if: always() && github.event_name != 'pull_request'
        run: |
          echo "Last run: $(date)" > keep_alive.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keep_alive.txt resource-version.json
          git diff --cached --quiet || git commit -m "Update runtime cache"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
