name: Login to Majsoul

on:
  schedule:
    - cron: '17 6 * * *'
      timezone: 'Asia/Seoul'
    - cron: '47 6 * * *'
      timezone: 'Asia/Seoul'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/main.yml'
      - 'scripts/**'
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/main.yml'
      - 'scripts/**'
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: majsoul-login-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check scheduled attendance state
        id: attendance
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          today="$(TZ=Asia/Seoul date +%F)"
          git fetch origin main:refs/remotes/origin/main --quiet
          last_run="$(git show refs/remotes/origin/main:last-attendance-kst.txt 2>/dev/null || true)"

          if [[ "$last_run" == "$today" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Attendance already completed for ${today}; skipping fallback run."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Attendance has not completed for ${today}; continuing."
          fi

      - name: Set up Node.js
        if: github.event_name != 'schedule' || steps.attendance.outputs.should_run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.attendance.outputs.should_run == 'true'
        run: npm ci

      - name: Run tests
        if: github.event_name != 'schedule' || steps.attendance.outputs.should_run == 'true'
        run: npm test

      - name: Check current JP client metadata
        if: github.event_name == 'pull_request'
        run: |
          npm run check:jp
          npm run check:yostar

      - name: Execute month ticket automation
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'schedule' && steps.attendance.outputs.should_run == 'true')
        run: npm start
        env:
          UID: ${{ secrets.UID }}
          TOKEN: ${{ secrets.TOKEN }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          YOSTAR_DEVICE_ID: ${{ secrets.YOSTAR_DEVICE_ID }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          MS_SERVER: ${{ secrets.MS_SERVER }}

      - name: Update Keep-Alive and Runtime Cache
        if: >-
          success() &&
          (github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'schedule' && steps.attendance.outputs.should_run == 'true'))
        shell: bash
        run: |
          echo "Last run: $(date --iso-8601=seconds)" > keep_alive.txt

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            TZ=Asia/Seoul date +%F > last-attendance-kst.txt
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keep_alive.txt resource-version.json auth-cache.json
          [[ -f last-attendance-kst.txt ]] && git add last-attendance-kst.txt
          git diff --cached --quiet || git commit -m "Update runtime cache [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
